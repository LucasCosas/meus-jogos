<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameLog — Catálogo & Recomendações</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #222230;
    --border: #2e2e42;
    --accent: #7c5cfc;
    --accent2: #a78bfa;
    --text: #e2e2f0;
    --muted: #7070a0;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* Layout */
  .app { display: grid; grid-template-rows: 56px 1fr; height: 100vh; }
  .navbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 32px; }
  .navbar .logo { font-size: 18px; font-weight: 700; color: var(--accent2); letter-spacing: -0.5px; }
  .navbar nav { display: flex; gap: 4px; }
  .nav-btn { background: none; border: none; color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all .15s; }
  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .nav-btn.active { color: var(--accent2); background: rgba(124,92,252,.15); }
  .navbar-right { margin-left: auto; display: flex; gap: 8px; }

  /* Tabs */
  .page { display: none; height: 100%; overflow: hidden; }
  .page.active { display: flex; }

  /* Catalog page */
  #page-catalog, #page-backlog { flex-direction: column; }
  .catalog-toolbar { padding: 16px 24px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 14px; outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .filter-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; outline: none; }
  .btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6b4ee0; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-danger { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.3); }
  .btn-danger:hover { background: rgba(248,113,113,.25); }

  .catalog-grid { flex: 1; overflow-y: auto; padding: 20px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; align-content: start; }

  /* Game card */
  .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px; transition: border-color .15s; }
  .game-card:hover { border-color: var(--accent); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .game-title { font-size: 15px; font-weight: 700; line-height: 1.3; }
  .game-rating { display: flex; align-items: center; gap: 4px; background: rgba(124,92,252,.2); padding: 3px 10px; border-radius: 20px; font-size: 13px; font-weight: 700; color: var(--accent2); white-space: nowrap; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; font-size: 11px; color: var(--muted); }
  .tag.genre { color: #93c5fd; border-color: rgba(147,197,253,.3); background: rgba(147,197,253,.08); }
  .tag.platform { color: var(--green); border-color: rgba(74,222,128,.3); background: rgba(74,222,128,.08); }
  .tag.service { color: var(--orange); border-color: rgba(251,146,60,.3); background: rgba(251,146,60,.08); }
  .tag.played { color: #a78bfa; border-color: rgba(167,139,250,.3); background: rgba(167,139,250,.08); }
  .card-meta { display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .card-actions { display: flex; gap: 8px; margin-top: auto; }

  /* Empty state */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 40px; color: var(--muted); }
  .empty-state h3 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; margin-bottom: 24px; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
  .modal-header h2 { font-size: 18px; }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 4px; border-radius: 6px; }
  .modal-close:hover { color: var(--text); background: var(--surface2); }
  .modal-body { padding: 20px 24px 24px; display: flex; flex-direction: column; gap: 16px; }

  /* Hours wizard */
  .hours-wizard { max-width: 680px; }
  .wizard-progress { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .wizard-progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 20px; }
  .wizard-progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
  .wizard-game { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .wizard-game-title { font-weight: 600; font-size: 15px; }
  .wizard-game-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .wizard-hours-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .wizard-hour-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; }
  .wizard-hour-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .wizard-hour-btn.selected { background: rgba(124,92,252,.2); border-color: var(--accent); color: var(--accent2); }
  .wizard-hour-btn.skip { color: var(--muted); font-weight: 400; }
  .wizard-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 4px; }
  .wizard-counter { font-size: 13px; color: var(--muted); }

  /* Form */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 13px; font-weight: 600; color: var(--muted); }
  .form-control { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; width: 100%; }
  .form-control:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Rating input */
  .rating-input { display: flex; gap: 6px; }
  .rating-input input[type=radio] { display: none; }
  .rating-input label { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; transition: all .1s; }
  .rating-input input:checked + label { background: var(--accent); border-color: var(--accent); color: #fff; }
  .rating-input label:hover { border-color: var(--accent); color: var(--accent2); }

  /* Checkbox chips */
  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip-group input[type=checkbox] { display: none; }
  .chip-group label { padding: 6px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; transition: all .1s; color: var(--muted); }
  .chip-group input:checked + label { background: rgba(124,92,252,.2); border-color: var(--accent); color: var(--accent2); }
  .chip-group label:hover { border-color: var(--accent); }

  /* Custom chip input */
  .chip-input-wrap { display: flex; gap: 8px; }
  .chip-input-wrap input { flex: 1; }
  .chip-input-wrap button { flex-shrink: 0; }

  /* Recommendations */
  #page-recs, #page-wishlist { flex-direction: column; }
  .recs-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .recs-header h2 { font-size: 20px; font-weight: 700; }
  .recs-mode-tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 10px; }
  .recs-mode-btn { background: none; border: none; color: var(--muted); padding: 6px 16px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; }
  .recs-mode-btn.active { background: var(--surface); color: var(--text); }
  .recs-controls { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .recs-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .recs-section h3 { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
  .rec-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; gap: 16px; align-items: flex-start; transition: border-color .15s; }
  .rec-card:hover { border-color: var(--accent); }
  .rec-rank { min-width: 36px; height: 36px; background: rgba(124,92,252,.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--accent2); flex-shrink: 0; }
  .rec-score { min-width: 48px; height: 48px; background: rgba(124,92,252,.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: var(--accent2); }
  .rec-info { flex: 1; min-width: 0; }
  .rec-info h4 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .rec-info .rec-reason { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .rec-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .genre-chart { display: flex; flex-direction: column; gap: 10px; }
  .genre-bar { display: flex; align-items: center; gap: 12px; }
  .genre-bar-label { min-width: 120px; font-size: 13px; color: var(--text); }
  .genre-bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .genre-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .5s; }
  .genre-bar-val { min-width: 32px; font-size: 12px; color: var(--muted); text-align: right; }
  /* Autocomplete */
  .autocomplete-wrap { position: relative; flex: 1; min-width: 240px; }
  .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; z-index: 50; margin-top: 4px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .autocomplete-item { padding: 10px 14px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  .autocomplete-item:hover { background: var(--surface2); }
  .autocomplete-item .ac-sub { font-size: 11px; color: var(--muted); }

  /* Recommendation engine v2 */
  .recs-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; width: 100%; }
  .recs-section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .behavior-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .behavior-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .behavior-btn.active { background: rgba(124,92,252,.2); border-color: var(--accent); color: var(--accent2); }
  .recs-weights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
  .weight-row { display: flex; flex-direction: column; gap: 5px; }
  .weight-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }
  .weight-label strong { color: var(--text); font-variant-numeric: tabular-nums; }
  input[type=range].weight-slider { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .signal-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
  .signal-chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); }
  .signal-chip.pos { color: var(--green); border-color: rgba(74,222,128,.35); background: rgba(74,222,128,.08); }
  .signal-chip.neg { color: var(--red); border-color: rgba(248,113,113,.35); background: rgba(248,113,113,.08); }
  .tag.subgenre { color: #f9a8d4; border-color: rgba(249,168,212,.3); background: rgba(249,168,212,.08); }
  /* Wishlist */
  .wishlist-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .wishlist-empty { text-align: center; padding: 80px 40px; color: var(--muted); }
  .wishlist-empty h3 { font-size: 20px; color: var(--text); margin-bottom: 8px; }

  /* Profile page */
  #page-profile { flex-direction: column; overflow-y: auto; }
  .profile-body { padding: 24px; display: flex; flex-direction: column; gap: 24px; max-width: 700px; }
  .profile-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .profile-section h3 { font-size: 16px; font-weight: 700; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; }
  .stat-box { background: var(--surface2); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-box .val { font-size: 28px; font-weight: 800; color: var(--accent2); }
  .stat-box .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 200; animation: slideIn .2s ease; }
  .toast.success { border-color: rgba(74,222,128,.5); color: var(--green); }
  .toast.error { border-color: rgba(248,113,113,.5); color: var(--red); }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  textarea.form-control { resize: vertical; min-height: 80px; }

  .replay-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .replay-ok { background: rgba(74,222,128,.15); color: var(--green); }
  .replay-soon { background: rgba(250,204,21,.12); color: var(--yellow); }
  .replay-recent { background: rgba(248,113,113,.12); color: var(--red); }

  /* Quick-rate overlay */
  .rate-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 300; flex-direction: column; align-items: center; justify-content: center; gap: 0; }
  .rate-overlay.open { display: flex; }
  .rate-progress-bar { position: absolute; top: 0; left: 0; height: 3px; background: var(--accent); transition: width .3s; }
  .rate-header { position: absolute; top: 20px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 28px; }
  .rate-counter { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .rate-close { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .rate-close:hover { color: var(--text); border-color: var(--muted); }
  .rate-body { display: flex; flex-direction: column; align-items: center; gap: 32px; max-width: 560px; width: 100%; padding: 0 24px; }
  .rate-platform { font-size: 12px; color: var(--muted); background: var(--surface2); padding: 3px 12px; border-radius: 20px; border: 1px solid var(--border); }
  .rate-title { font-size: clamp(22px, 4vw, 36px); font-weight: 800; text-align: center; line-height: 1.2; color: var(--text); }
  .rate-meta { font-size: 13px; color: var(--muted); }
  .rate-stars { display: flex; gap: 10px; }
  .rate-star { font-size: 52px; cursor: pointer; color: var(--border); transition: color .1s, transform .1s; line-height: 1; user-select: none; }
  .rate-star:hover, .rate-star.hov { color: var(--yellow); transform: scale(1.15); }
  .rate-star.hov ~ .rate-star { color: var(--border) !important; transform: scale(1) !important; }
  .rate-actions { display: flex; gap: 12px; }
  .rate-skip { background: none; border: 1px solid var(--border); color: var(--muted); padding: 10px 24px; border-radius: 10px; cursor: pointer; font-size: 14px; }
  .rate-skip:hover { border-color: var(--muted); color: var(--text); }
  .rate-done-msg { font-size: 22px; font-weight: 700; color: var(--green); text-align: center; }
  .rate-only-unrated { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .playtime-btn { width: 100%; padding: 18px 24px; border-radius: 14px; border: 2px solid var(--border); background: var(--surface); color: var(--text); font-size: 20px; font-weight: 700; cursor: pointer; transition: all .12s; text-align: left; }
  .playtime-btn:hover { border-color: var(--accent); background: rgba(124,92,252,.12); transform: translateX(6px); }
</style>
</head>
<body>
<div class="app">
  <!-- Navbar -->
  <header class="navbar">
    <span class="logo">🎮 GameLog</span>
    <nav>
      <button class="nav-btn active" onclick="switchPage('catalog',event)">Catálogo</button>
      <button class="nav-btn" onclick="switchPage('backlog',event)">Backlog</button>
      <button class="nav-btn" onclick="switchPage('wishlist',event)">Wishlist</button>
      <button class="nav-btn" onclick="switchPage('recs',event)">Recomendações</button>
      <button class="nav-btn" onclick="switchPage('profile',event)">Perfil & Stats</button>
    </nav>
    <div class="navbar-right">
      <button class="btn btn-secondary" onclick="openRateMode('stars')">⭐ Avaliar Jogos</button>
      <button class="btn btn-secondary" onclick="openRateMode('playtime')">🕹 Quanto Joguei</button>
      <button class="btn btn-primary" onclick="openModal()">+ Adicionar Jogo</button>
    </div>
  </header>

  <!-- Catalog -->
  <div id="page-catalog" class="page active">
    <div class="catalog-toolbar">
      <input class="search-box" id="search" placeholder="Buscar jogo..." oninput="renderCatalog()">
      <select class="filter-select" id="filter-genre" onchange="renderCatalog()">
        <option value="">Todos os gêneros</option>
      </select>
      <select class="filter-select" id="filter-platform" onchange="renderCatalog()">
        <option value="">Todas as plataformas</option>
      </select>
      <select class="filter-select" id="filter-sort" onchange="renderCatalog()">
        <option value="rating">Maior nota</option>
        <option value="title">A-Z</option>
        <option value="recent">Mais recente</option>
      </select>
    </div>
    <div class="catalog-grid" id="catalog-grid"></div>
  </div>

  <!-- Backlog -->
  <div id="page-backlog" class="page">
    <div class="catalog-toolbar">
      <input class="search-box" id="backlog-search" placeholder="Buscar no backlog..." oninput="debouncedBacklog()">
      <select class="filter-select" id="backlog-genre" onchange="renderBacklog()">
        <option value="">Todos os gêneros</option>
      </select>
      <select class="filter-select" id="backlog-platform" onchange="renderBacklog()">
        <option value="">Todas as plataformas</option>
      </select>
      <select class="filter-select" id="backlog-sort" onchange="renderBacklog()">
        <option value="igdb_rating">Nota IGDB</option>
        <option value="community_rating">Nota comunidade</option>
        <option value="title">A-Z</option>
        <option value="released">Lançamento</option>
      </select>
      <span id="backlog-count" style="font-size:13px;color:var(--muted);white-space:nowrap"></span>
    </div>
    <div class="catalog-grid" id="backlog-grid"></div>
  </div>

  <!-- Wishlist -->
  <div id="page-wishlist" class="page">
    <div class="recs-header"><h2>💾 Wishlist</h2></div>
    <div class="wishlist-body" id="wishlist-body"></div>
  </div>

  <!-- Recommendations -->
  <div id="page-recs" class="page">
    <div class="recs-header">
      <h2>Recomendações</h2>
      <div class="recs-mode-tabs">
        <button class="recs-mode-btn active" id="recs-tab-genre" onclick="switchRecsMode('genre')">Por Gênero</button>
        <button class="recs-mode-btn" id="recs-tab-similar" onclick="switchRecsMode('similar')">Parecido com...</button>
      </div>
    </div>
    <div class="recs-controls" id="recs-controls">
      <!-- preenchido por switchRecsMode() -->
    </div>
    <div class="recs-body" id="recs-body">
      <div style="color:var(--muted);font-size:14px;text-align:center;padding:60px 0">Selecione um gênero ou busque um jogo de referência para começar.</div>
    </div>
  </div>

  <!-- Profile -->
  <div id="page-profile" class="page">
    <div class="profile-body" id="profile-body"></div>
  </div>
</div>

<!-- Quick Rate Overlay -->

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
const DEFAULT_GENRES = ['RPG','Action RPG','FPS','TPS','Aventura','Plataforma','Estratégia','Simulação','Esportes','Luta','Corrida','Horror','Puzzle','Metroidvania','Roguelike','MOBA','Battle Royale','Mundo Aberto','Soulslike','Visual Novel'];
const DEFAULT_PLATFORMS = ['PS5','PS4','Xbox Series','Xbox One','Nintendo Switch','PC','Mobile'];
const DEFAULT_SERVICES = ['Game Pass','PS Plus','EA Play','Nintendo Online','Prime Gaming','GeForce Now'];

let _games = [];
let _profile = { platforms: [], subscriptions: [] };

function loadGames() { return _games; }
function saveGames(g) {
  _games = g;
  _persistToDisk();
}
function loadProfile() { return _profile; }
function saveProfile(p) {
  _profile = p;
  _persistToDisk();
}
function _persistToDisk() {
  fetch('games.json', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ games: _games, profile: _profile })
  }).catch(() => {});
}

// ─── Page switching ───────────────────────────────────────────────────────────
function switchPage(name, ev) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (ev && ev.currentTarget) ev.currentTarget.classList.add('active');
  if (name === 'backlog') renderBacklog();
  if (name === 'recs') { switchRecsMode(_recsMode || 'genre'); }
  if (name === 'wishlist') renderWishlist();
  if (name === 'profile') renderProfile();
}

// ─── Catalog ─────────────────────────────────────────────────────────────────
function replayStatus(year) {
  if (!year) return null;
  const diff = new Date().getFullYear() - year;
  if (diff >= 3) return { cls: 'replay-ok', label: '▶ Pode rejogar' };
  if (diff >= 1) return { cls: 'replay-soon', label: '⏳ Em breve' };
  return { cls: 'replay-recent', label: '🕒 Jogou recentemente' };
}

function ratingColor(r) {
  if (!r) return 'var(--muted)';
  if (r >= 9) return '#4ade80';
  if (r >= 7) return '#a78bfa';
  if (r >= 5) return '#facc15';
  return '#f87171';
}

function starsDisplay(r) {
  if (!r) return '— sem nota';
  const stars = Math.round(r / 2);
  return '★'.repeat(stars) + '☆'.repeat(5 - stars);
}

function renderCatalog() {
  const games = loadGames();
  const q = document.getElementById('search').value.toLowerCase();
  const genre = document.getElementById('filter-genre').value;
  const platform = document.getElementById('filter-platform').value;
  const sort = document.getElementById('filter-sort').value;

  let filtered = games.filter(g => {
    if (q && !g.title.toLowerCase().includes(q)) return false;
    if (genre && !(g.genres || []).includes(genre)) return false;
    if (platform && g.platformPlayed !== platform && !(g.availableOn || []).includes(platform)) return false;
    return true;
  });

  if (sort === 'rating') filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
  else if (sort === 'title') filtered.sort((a, b) => a.title.localeCompare(b.title));
  else filtered.sort((a, b) => (b.id || 0) - (a.id || 0));

  // Update filter dropdowns
  const allGenres = [...new Set(games.flatMap(g => g.genres || []))].sort();
  const allPlatforms = [...new Set(games.flatMap(g => [g.platformPlayed, ...(g.availableOn || [])]).filter(Boolean))].sort();
  const genSel = document.getElementById('filter-genre');
  const genCur = genSel.value;
  genSel.innerHTML = `<option value="">Todos os gêneros</option>` + allGenres.map(v => `<option value="${v}"${v===genCur?' selected':''}>${v}</option>`).join('');

  const platSel = document.getElementById('filter-platform');
  const platCur = platSel.value;
  platSel.innerHTML = buildPlatformOptions(allPlatforms, _profile.platforms || [], platCur);

  const grid = document.getElementById('catalog-grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><h3>${games.length ? 'Nenhum jogo encontrado' : 'Seu catálogo está vazio'}</h3><p>${games.length ? 'Tente outros filtros.' : 'Adicione seu primeiro jogo para começar!'}</p>${!games.length ? '<button class="btn btn-primary" onclick="openModal()">+ Adicionar Jogo</button>' : ''}</div>`;
    return;
  }

  grid.innerHTML = filtered.map(g => {
    const replay = replayStatus(g.year);
    const services = (g.availableOn || []).filter(a => DEFAULT_SERVICES.includes(a) || !DEFAULT_PLATFORMS.includes(a));
    const platforms = (g.availableOn || []).filter(a => DEFAULT_PLATFORMS.includes(a));
    const playtimeMap = { little: '🕹 Pouco', medium: '🎮 Médio', much: '🏆 Muito', completed: '✅ Zerado' };
    return `<div class="game-card">
      <div class="card-header">
        <span class="game-title">${esc(g.title)}</span>
        <span class="game-rating" style="color:${ratingColor(g.rating)}">${starsDisplay(g.rating)}</span>
      </div>
      <div class="tags">
        ${g.played === 'yes' ? '<span class="tag played">✅ Jogado</span>' : ''}
        ${(g.genres||[]).map(gn => `<span class="tag genre">${esc(gn)}</span>`).join('')}
      </div>
      <div class="tags">
        ${g.platformPlayed ? `<span class="tag platform">🎮 ${esc(g.platformPlayed)}</span>` : ''}
        ${platforms.map(p => `<span class="tag platform">${esc(p)}</span>`).join('')}
        ${services.map(s => `<span class="tag service">${esc(s)}</span>`).join('')}
      </div>
      <div class="card-meta">
        ${g.year ? `<span>📅 ${g.year}</span>` : ''}
        ${g.playtime ? `<span>${playtimeMap[g.playtime]}</span>` : ''}
        ${g.estimated_hours ? `<span title="Tempo estimado de jogo">⏱ ~${g.estimated_hours}h</span>` : g.hours ? `<span>⏱ ~${g.hours}h</span>` : ''}
        ${g.igdb_rating ? `<span title="Média de críticas (IGDB)">🎯 ${g.igdb_rating}</span>` : ''}
      </div>
      ${replay ? `<div><span class="replay-badge ${replay.cls}">${replay.label}</span></div>` : ''}
      ${g.notes ? `<div style="font-size:12px;color:var(--muted);font-style:italic;border-top:1px solid var(--border);padding-top:10px">${esc(g.notes)}</div>` : ''}
      <div class="card-actions">
        <button class="btn btn-secondary btn-sm" onclick="editGame(${g.id})">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteGame(${g.id})">Remover</button>
      </div>
    </div>`;
  }).join('');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Gera HTML de opções de plataforma colocando as do usuário primeiro
function buildPlatformOptions(allPlats, userPlatforms, selected='') {
  const mine = userPlatforms.filter(p => allPlats.includes(p));
  const rest  = allPlats.filter(p => !mine.includes(p));
  const opt = p => `<option value="${esc(p)}"${p===selected?' selected':''}>${esc(p)}</option>`;
  let html = `<option value="">Todas as plataformas</option>`;
  if (mine.length) {
    html += `<optgroup label="Minhas plataformas">${mine.map(opt).join('')}</optgroup>`;
    html += `<optgroup label="──────────────"></optgroup>`;
  }
  html += rest.map(opt).join('');
  return html;
}

// ─── Modal ────────────────────────────────────────────────────────────────────
let editingId = null;
let selectedGenres = new Set();

function buildRatingInput() {
  const wrap = document.getElementById('rating-input');
  wrap.innerHTML = Array.from({length:10},(_,i)=>i+1).map(n =>
    `<input type="radio" name="rating" id="r${n}" value="${n}"><label for="r${n}">${n}</label>`
  ).join('');
}

function buildGenreChips(selected=[]) {
  const profile = loadProfile();
  const allGenres = [...new Set([...DEFAULT_GENRES, ...profile.customGenres||[], ...selected])].sort();
  selectedGenres = new Set(selected);
  document.getElementById('genres-chips').innerHTML = allGenres.map((g,i) =>
    `<input type="checkbox" id="gc${i}" value="${esc(g)}" data-genre="${esc(g)}" ${selectedGenres.has(g)?'checked':''}>
     <label for="gc${i}">${esc(g)}</label>`
  ).join('');
  document.getElementById('genres-chips').querySelectorAll('input[type=checkbox]').forEach(el => {
    el.addEventListener('change', function() { toggleGenre(this.dataset.genre, this.checked); });
  });
}

function toggleGenre(g, checked) { if (checked) selectedGenres.add(g); else selectedGenres.delete(g); }


function buildPlatformPlayed(selected='') {
  const profile = loadProfile();
  const opts = [...new Set([...DEFAULT_PLATFORMS, ...profile.platforms])];
  document.getElementById('game-platform-played').innerHTML =
    '<option value="">Selecione...</option>' + opts.map(p => `<option value="${p}" ${p===selected?'selected':''}>${p}</option>`).join('');
}

function addCustomGenre() {
  const inp = document.getElementById('genre-custom');
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  const profile = loadProfile();
  profile.customGenres = [...new Set([...(profile.customGenres||[]), val])];
  saveProfile(profile);
  const wasSelected = selectedGenres;
  buildGenreChips([...selectedGenres]);
  // re-check from previous selection
  wasSelected.forEach(g => {
    selectedGenres.add(g);
    const el = document.querySelector(`#genres-chips input[value="${g}"]`);
    if (el) el.checked = true;
  });
  selectedGenres.add(val);
  const newEl = document.querySelector(`#genres-chips input[value="${val}"]`);
  if (newEl) newEl.checked = true;
}

function openModal(game=null) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Adicionar Jogo';
  document.getElementById('game-id').value = '';
  document.getElementById('game-title').value = '';
  document.getElementById('game-year').value = '';
  document.getElementById('game-hours').value = '';
  document.getElementById('game-notes').value = '';
  document.getElementById('game-playtime').value = '';
  document.getElementById('game-played').value = '';
  document.getElementById('game-completed').value = '';
  buildRatingInput();
  buildGenreChips();
  buildPlatformPlayed();
  if (game) {
    editingId = game.id;
    document.getElementById('modal-title').textContent = 'Editar Jogo';
    document.getElementById('game-title').value = game.title || '';
    document.getElementById('game-year').value = game.year || '';
    document.getElementById('game-hours').value = game.estimated_hours || game.hours || '';
    document.getElementById('game-notes').value = game.notes || '';
    document.getElementById('game-playtime').value = game.playtime || '';
    document.getElementById('game-played').value = game.played || '';
    document.getElementById('game-completed').value = game.completed || '';
    if (game.rating) {
      const radio = document.querySelector(`#rating-input input[value="${game.rating}"]`);
      if (radio) radio.checked = true;
    }
    buildGenreChips(game.genres||[]);
    buildPlatformPlayed(game.platformPlayed||'');
  }
  document.getElementById('modal').classList.add('open');
  document.getElementById('game-title').focus();
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function editGame(id) {
  const game = loadGames().find(g => g.id === id);
  if (game) openModal(game);
}

function saveGame() {
  const title = document.getElementById('game-title').value.trim();
  if (!title) return showToast('Informe o título do jogo', 'error');
  const ratingEl = document.querySelector('#rating-input input:checked');

  const prev = loadGames().find(g => g.id === editingId) || {};
  const game = {
    ...prev,
    igdb_id: prev.igdb_id || window._pendingIgdbId || null,
    id: editingId || Date.now(),
    title,
    rating: ratingEl ? parseInt(ratingEl.value) : (prev.rating || null),
    year: parseInt(document.getElementById('game-year').value) || null,
    estimated_hours: parseInt(document.getElementById('game-hours').value) || prev.estimated_hours || null,
    hours: prev.hours || null,
    genres: [...selectedGenres],
    platformPlayed: document.getElementById('game-platform-played').value || null,
    playtime: document.getElementById('game-playtime').value || null,
    played: document.getElementById('game-played').value || null,
    completed: document.getElementById('game-playtime').value === 'completed'
      ? 'yes'
      : (document.getElementById('game-completed').value || null),
    notes: document.getElementById('game-notes').value.trim(),
  };

  let games = loadGames();
  if (editingId) {
    games = games.map(g => g.id === editingId ? game : g);
    showToast('Jogo atualizado!', 'success');
  } else {
    games.push(game);
    showToast('Jogo adicionado!', 'success');
  }
  saveGames(games);
  window._pendingIgdbId = null;
  closeModal();
  renderCatalog();
}

function deleteGame(id) {
  if (!confirm('Remover este jogo do catálogo?')) return;
  saveGames(loadGames().filter(g => g.id !== id));
  renderCatalog();
  showToast('Jogo removido', 'success');
}

// ─── Recommendations v2 ───────────────────────────────────────────────────────
let _recsMode    = 'genre';
let _recsRefGame = null;
let _recsWeights = { genre_fit: 6, subgenre_fit: 4, igdb_score: 5, community_score: 2, platform_fit: 3 };
let _recsBehavior = 'balanced'; // 'balanced' | 'hidden_gems' | 'top_rated'

// ── Genre normalization ───────────────────────────────────────────────────────
// Maps user catalog genre names → canonical IGDB genre names (for genre affinity)
const GENRE_ALIASES = {
  'aventura': 'Adventure', 'action-aventura': 'Adventure', 'sandbox': 'Adventure',
  'mundo aberto': 'Adventure', 'horror': 'Adventure', 'stealth': 'Adventure',
  'rpg': 'Role-playing (RPG)', 'action rpg': 'Role-playing (RPG)',
  'fps': 'Shooter',
  'plataforma': 'Platform', 'platformer': 'Platform',
  'estratégia': 'Strategy',
  'simulação': 'Simulator', 'simulation': 'Simulator',
  'esportes': 'Sport', 'sports': 'Sport',
  'luta': 'Fighting',
  'card': 'Card & Board Game', 'card game': 'Card & Board Game',
  'massively multiplayer': 'Arcade',
};
// Maps user catalog genre names → backlog subgenre names (for subgenre affinity)
const SUBGENRE_ALIASES = {
  'soulslike': 'Soulslike',
  'metroidvania': 'Metroidvania',
  'roguelike': 'Roguelike',
  'roguelite': 'Roguelite',
};
const BACKLOG_SUBGENRES = ['Soulslike', 'Metroidvania', 'Roguelite', 'Roguelike'];

function normalizeGenre(g)    { return GENRE_ALIASES[g.toLowerCase()]    || g; }
function normalizeSubgenre(g) { return SUBGENRE_ALIASES[g.toLowerCase()] || null; }

// ── User profile ──────────────────────────────────────────────────────────────
// Affinity range: [-1, +1]. nota 2 → -0.6, nota 5 → 0, nota 9 → +0.8
function computeUserProfile() {
  const games = loadGames().filter(g => g.rating);
  const gd = {}, sd = {};

  games.forEach(g => {
    const aff = (g.rating - 5) / 5; // [-1, +1]
    (g.genres || []).forEach(raw => {
      const canon = normalizeGenre(raw);
      if (!gd[canon]) gd[canon] = { sum: 0, count: 0 };
      gd[canon].sum += aff; gd[canon].count++;

      const sub = normalizeSubgenre(raw);
      if (sub) {
        if (!sd[sub]) sd[sub] = { sum: 0, count: 0 };
        sd[sub].sum += aff; sd[sub].count++;
      }
    });
  });

  const genreAffinity    = Object.fromEntries(Object.entries(gd).map(([k,v]) => [k, v.sum/v.count]));
  const subgenreAffinity = Object.fromEntries(Object.entries(sd).map(([k,v]) => [k, v.sum/v.count]));
  return { genreAffinity, subgenreAffinity };
}

// ── Signal functions (all return [0, 1]) ─────────────────────────────────────
function genreFit(game, profile) {
  const genres = game.genres || [];
  if (!genres.length) return 0.5;
  const affs = genres.map(g => profile.genreAffinity[g] !== undefined ? profile.genreAffinity[g] : 0);
  return (affs.reduce((s, v) => s + v, 0) / affs.length + 1) / 2;
}

function subgenreFit(game, profile) {
  const subs = game.subgenres || [];
  if (!subs.length) return 0.5;
  const affs = subs.map(s => profile.subgenreAffinity[s] !== undefined ? profile.subgenreAffinity[s] : 0);
  return (affs.reduce((s, v) => s + v, 0) / affs.length + 1) / 2;
}

function igdbScore01(game) {
  const C = 3, m = 75;
  if (!game.igdb_rating) return 0.5;
  const cnt = game.igdb_rating_count || 1;
  let base = ((game.igdb_rating * cnt + m * C) / (cnt + C)) / 100;
  if (_recsBehavior === 'hidden_gems') {
    // Penaliza jogos populares (escala real do backlog: max ~52 reviews)
    const pop = Math.min(1, cnt / 30);
    base *= (1 - pop * 0.45);
  }
  return Math.max(0, Math.min(1, base));
}

function communityScore01(game) {
  return game.community_rating ? Math.min(1, game.community_rating / 100) : 0.5;
}

function platformFit(game, userPlatforms) {
  if (!userPlatforms.length) return 0.5; // neutro se não configurado
  const gamePlats = game.platforms || [];
  if (!gamePlats.length) return 0.5;
  return gamePlats.some(p => userPlatforms.includes(p)) ? 1.0 : 0.0;
}

// ── Unified scorer ────────────────────────────────────────────────────────────
function scoreGame(game, profile, userPlatforms) {
  const gf = genreFit(game, profile);
  const sf = subgenreFit(game, profile);
  const is = igdbScore01(game);
  const cs = communityScore01(game);
  const pf = platformFit(game, userPlatforms);

  const w = _recsWeights;
  const total = w.genre_fit + w.subgenre_fit + w.igdb_score + w.community_score + w.platform_fit || 1;
  const score = (gf * w.genre_fit + sf * w.subgenre_fit + is * w.igdb_score + cs * w.community_score + pf * w.platform_fit) / total;
  return { score, signals: { gf, sf, is, cs, pf } };
}

function jaccard(a, b) {
  const A = new Set(a), B = new Set(b);
  const inter = [...A].filter(x => B.has(x)).length;
  const union = new Set([...A, ...B]).size;
  return union === 0 ? 0 : inter / union;
}

// ── Signal breakdown chips ────────────────────────────────────────────────────
function buildSignalChips(game, signals, profile, extra) {
  const chips = [];
  const { gf, sf, is, cs, pf } = signals;

  // Top genre fit chip
  const topGenre = (game.genres || [])
    .filter(g => profile.genreAffinity[g] !== undefined)
    .sort((a, b) => Math.abs(profile.genreAffinity[b]) - Math.abs(profile.genreAffinity[a]))[0];
  if (topGenre) {
    const aff = profile.genreAffinity[topGenre]; // [-1, +1]
    const rating = (aff * 5 + 5).toFixed(1);
    const cls = aff > 0.1 ? 'pos' : aff < -0.1 ? 'neg' : '';
    chips.push(`<span class="signal-chip ${cls}">🎭 ${esc(topGenre)} ${rating}/10</span>`);
  }

  // Subgenre chips
  (game.subgenres || []).forEach(s => {
    const aff = profile.subgenreAffinity?.[s];
    const cls = aff !== undefined ? (aff > 0.1 ? 'pos' : aff < -0.1 ? 'neg' : '') : '';
    const label = aff !== undefined ? `${esc(s)} ${(aff*5+5).toFixed(1)}/10` : esc(s);
    chips.push(`<span class="signal-chip ${cls}">⚔ ${label}</span>`);
  });

  // IGDB
  if (game.igdb_rating) {
    const cls = is > 0.80 ? 'pos' : is > 0.65 ? '' : '';
    chips.push(`<span class="signal-chip ${cls}">🎯 IGDB ${game.igdb_rating}</span>`);
  }

  // Similarity extras (mode similar)
  if (extra?.genSim > 0) {
    chips.push(`<span class="signal-chip pos">🔗 ${Math.round(extra.genSim*100)}% gênero sim.</span>`);
  }
  if (extra?.subSim > 0) {
    chips.push(`<span class="signal-chip pos">⚔ ${Math.round(extra.subSim*100)}% subgênero sim.</span>`);
  }

  // Platform fit
  if (pf === 1) chips.push(`<span class="signal-chip pos">🎮 Disponível</span>`);
  if (pf === 0) chips.push(`<span class="signal-chip neg">🎮 Sem plataforma</span>`);

  return chips.join('');
}

// ── Autocomplete ──────────────────────────────────────────────────────────────
function recsAutocomplete(q) {
  const list = document.getElementById('recs-ac-list');
  if (q.length < 2) { list.style.display = 'none'; return; }
  const ql = q.toLowerCase();
  const played  = _games.filter(g => g.title.toLowerCase().includes(ql)).slice(0, 4).map(g => ({ ...g, _src: 'jogado' }));
  const backlog = _backlog.filter(g => g.title.toLowerCase().includes(ql)).slice(0, 4).map(g => ({ ...g, _src: 'backlog' }));
  const combined = [...played, ...backlog].slice(0, 8);
  if (!combined.length) { list.style.display = 'none'; return; }
  list.style.display = 'block';
  list.innerHTML = combined.map((g, i) => `
    <div class="autocomplete-item" onclick="selectRecsRef(${i})">
      <span>${esc(g.title)}</span><span class="ac-sub">${g._src}</span>
    </div>`).join('');
  list._data = combined;
}

function selectRecsRef(idx) {
  const list = document.getElementById('recs-ac-list');
  _recsRefGame = list._data[idx];
  list.style.display = 'none';
  document.getElementById('recs-similar-input').value = _recsRefGame.title;
  document.getElementById('recs-ref-badge').textContent = `✓ ${_recsRefGame.title}`;
  runRecs();
}

// ── runRecs ───────────────────────────────────────────────────────────────────
function runRecs() {
  const profile      = computeUserProfile();
  const played       = new Set(_games.map(g => g.igdb_id).filter(Boolean));
  const wl           = loadWishlist();
  const body         = document.getElementById('recs-body');
  const userPlatforms = _profile.platforms || [];

  const platformFilter = document.getElementById('recs-filter-platform')?.value || '';
  const excludeWL      = document.getElementById('recs-exclude-wl')?.checked ?? true;

  // Candidatos base: aplica filtros globais
  let candidates = _backlog.filter(g => {
    if (played.has(g.igdb_id)) return false;
    if (excludeWL && wl.includes(g.igdb_id)) return false;
    if (platformFilter && !(g.platforms || []).includes(platformFilter)) return false;
    if (_recsBehavior === 'top_rated' && (g.igdb_rating_count || 0) < 10) return false;
    return true;
  });

  const scored = [];

  if (_recsMode === 'genre') {
    const val = document.getElementById('recs-genre-select')?.value || '';
    if (!val) return;
    const [type, name] = val.split(':');
    candidates = candidates.filter(g =>
      type === 'genre' ? (g.genres || []).includes(name) : (g.subgenres || []).includes(name)
    );
    candidates.forEach(game => {
      const { score, signals } = scoreGame(game, profile, userPlatforms);
      scored.push({ game, score, signals, extra: null });
    });

  } else {
    if (!_recsRefGame) return;
    // Normaliza gêneros do jogo de referência para nomes IGDB
    // (necessário quando o ref vem do catálogo do usuário com nomes próprios)
    const refGenres = [...new Set(((_recsRefGame.genres || []).map(normalizeGenre)))];
    // Subgêneros: usa os do backlog + mapeia gêneros do catálogo para subgêneros
    const refSubsFromGenres = (_recsRefGame.genres || []).map(normalizeSubgenre).filter(Boolean);
    const refSubs = [...new Set([...(_recsRefGame.subgenres || []), ...refSubsFromGenres])];

    candidates = candidates.filter(g => g.igdb_id !== _recsRefGame.igdb_id);
    candidates.forEach(game => {
      const genSim = jaccard(refGenres, game.genres    || []);
      const subSim = jaccard(refSubs,   game.subgenres || []);
      if (genSim === 0 && subSim === 0) return;
      const { score: baseScore, signals } = scoreGame(game, profile, userPlatforms);
      // Blend: 50% content-based + 50% similarity
      const simScore = genSim * 0.6 + subSim * 0.4;
      const score    = baseScore * 0.5 + simScore * 0.5;
      scored.push({ game, score, signals, extra: { genSim, subSim } });
    });
  }

  scored.sort((a, b) => b.score - a.score);
  const top = scored.slice(0, 30);

  if (!top.length) {
    body.innerHTML = `<div style="color:var(--muted);text-align:center;padding:60px 0">Nenhum resultado encontrado.</div>`;
    return;
  }

  body.innerHTML = top.map(({ game: g, signals, extra }, i) => {
    const inWl = wl.includes(g.igdb_id);
    const igdbColor = g.igdb_rating >= 90 ? 'var(--green)' : g.igdb_rating >= 75 ? 'var(--accent2)' : 'var(--yellow)';
    const chips = buildSignalChips(g, signals, profile, extra);
    return `<div class="rec-card">
      <div class="rec-rank">#${i+1}</div>
      <div class="rec-info">
        <h4>${esc(g.title)}</h4>
        <div class="tags">
          ${(g.genres||[]).map(gn=>`<span class="tag genre">${esc(gn)}</span>`).join('')}
          ${(g.subgenres||[]).map(s=>`<span class="tag subgenre">${esc(s)}</span>`).join('')}
        </div>
        <div class="card-meta" style="margin-top:6px">
          ${g.year ? `<span>📅 ${g.year}</span>` : ''}
          ${g.igdb_rating ? `<span style="color:${igdbColor}">🎯 ${g.igdb_rating}</span>` : ''}
          ${(g.platforms||[]).slice(0,3).map(p=>`<span>🎮 ${esc(p)}</span>`).join('')}
        </div>
        <div class="signal-bar">${chips}</div>
      </div>
      <div class="rec-actions">
        <button class="btn btn-secondary btn-sm" style="${inWl?'color:var(--accent2);border-color:var(--accent)':''}"
          onclick="toggleWishlist(${g.igdb_id}, this)">
          ${inWl ? '💾 Na WL' : '+ Wishlist'}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ─── Wishlist ─────────────────────────────────────────────────────────────────
function loadWishlist() {
  const data = JSON.parse(localStorage.getItem('gamelog_wishlist') || '[]');
  return data;
}
function saveWishlist(wl) {
  localStorage.setItem('gamelog_wishlist', JSON.stringify(wl));
}

function toggleWishlist(igdbId, btn) {
  const wl = loadWishlist();
  const idx = wl.indexOf(igdbId);
  if (idx === -1) {
    wl.push(igdbId);
    btn.textContent = '💾 Na WL';
    btn.style.color = 'var(--accent2)';
    btn.style.borderColor = 'var(--accent)';
    showToast('Adicionado à Wishlist', 'success');
  } else {
    wl.splice(idx, 1);
    btn.textContent = '+ Wishlist';
    btn.style.color = '';
    btn.style.borderColor = '';
    showToast('Removido da Wishlist', 'success');
  }
  saveWishlist(wl);
  if (document.getElementById('page-wishlist').classList.contains('active')) renderWishlist();
}

function renderWishlist() {
  const wl   = loadWishlist();
  const body = document.getElementById('wishlist-body');

  if (!wl.length) {
    body.innerHTML = `<div class="wishlist-empty"><h3>Wishlist vazia</h3><p>Adicione jogos pela aba Recomendações.</p></div>`;
    return;
  }

  const games = wl.map(id => _backlog.find(g => g.igdb_id === id) || { igdb_id: id, _missing: true, title: `Jogo #${id}` });

  body.innerHTML = games.map(g => {
    if (g._missing) return `<div class="rec-card" style="opacity:.5">
      <div class="rec-info"><h4>${esc(g.title)}</h4><div style="color:var(--muted);font-size:13px">Não encontrado no backlog atual</div></div>
      <div class="rec-actions"><button class="btn btn-secondary btn-sm" onclick="removeFromWishlist(${g.igdb_id})">Remover</button></div>
    </div>`;
    const igdbColor = g.igdb_rating >= 90 ? 'var(--green)' : g.igdb_rating >= 75 ? 'var(--accent2)' : 'var(--yellow)';
    return `<div class="rec-card">
      <div class="rec-info">
        <h4>${esc(g.title)}</h4>
        <div class="tags">
          ${(g.genres||[]).map(gn=>`<span class="tag genre">${esc(gn)}</span>`).join('')}
          ${(g.subgenres||[]).map(s=>`<span class="tag">${esc(s)}</span>`).join('')}
        </div>
        <div class="card-meta" style="margin-top:6px">
          ${g.year ? `<span>📅 ${g.year}</span>` : ''}
          ${g.igdb_rating ? `<span style="color:${igdbColor}">🎯 ${g.igdb_rating}</span>` : ''}
          ${(g.platforms||[]).slice(0,3).map(p=>`<span>🎮 ${esc(p)}</span>`).join('')}
        </div>
      </div>
      <div class="rec-actions">
        <button class="btn btn-primary btn-sm" onclick="startPlayingWishlist(${g.igdb_id})">▶ Comecei</button>
        <button class="btn btn-secondary btn-sm" onclick="removeFromWishlist(${g.igdb_id})">Remover</button>
      </div>
    </div>`;
  }).join('');
}

function removeFromWishlist(igdbId) {
  const wl = loadWishlist().filter(id => id !== igdbId);
  saveWishlist(wl);
  renderWishlist();
}

function startPlayingWishlist(igdbId) {
  const g = _backlog.find(x => x.igdb_id === igdbId);
  if (!g) return;
  // Remove da wishlist e abre modal pré-preenchido
  removeFromWishlist(igdbId);
  openModal();

    document.getElementById('modal-title').textContent = 'Adicionar Jogo';
    document.getElementById('game-title').value = g.title;
    document.getElementById('game-year').value = g.year || '';
    buildGenreChips(g.genres || []);
    if (g.igdb_id) {
      const prev = loadGames().find(x => x.id === editingId) || {};
      // store igdb_id for new game
      window._pendingIgdbId = g.igdb_id;
    }

}

      <div class="tags">${(profile.subscriptions||[]).length ? (profile.subscriptions||[]).map(s=>`<span class="tag service">${esc(s)}</span>`).join('') : ''}</div>
      <button class="btn btn-secondary btn-sm" style="align-self:flex-start" onclick="openProfileModal()">Editar plataformas</button>
    </div>
    <div class="profile-section">
      <h3>💾 Dados</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="exportData()">Exportar JSON</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-file').click()">Importar JSON</button>
      </div>
      <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(this)">
    </div>
  `;
}

// ─── Profile settings modal ───────────────────────────────────────────────────
function openProfileModal() {
  const profile = loadProfile();
  const allPlat = [...new Set([...DEFAULT_PLATFORMS, ...(profile.platforms||[])])];
  const allSubs = [...new Set([...DEFAULT_SERVICES, ...(profile.subscriptions||[])])];

  document.getElementById('platform-chips-config').innerHTML = allPlat.map((p,i)=>
    `<input type="checkbox" id="pc${i}" value="${p}" ${(profile.platforms||[]).includes(p)?'checked':''}>
     <label for="pc${i}">${p}</label>`
  ).join('');
  document.getElementById('subscription-chips-config').innerHTML = allSubs.map((s,i)=>
    `<input type="checkbox" id="sc${i}" value="${s}" ${(profile.subscriptions||[]).includes(s)?'checked':''}>
     <label for="sc${i}">${s}</label>`
  ).join('');
  document.getElementById('modal-profile').classList.add('open');
}

function addCustomPlatform() {
  const inp = document.getElementById('platform-custom');
  const val = inp.value.trim(); if (!val) return;
  inp.value = '';
  const chips = document.getElementById('platform-chips-config');
  const id = 'pc_' + Date.now();
  chips.innerHTML += `<input type="checkbox" id="${id}" value="${val}" checked><label for="${id}">${val}</label>`;
}

function addCustomSubscription() {
  const inp = document.getElementById('subscription-custom');
  const val = inp.value.trim(); if (!val) return;
  inp.value = '';
  const chips = document.getElementById('subscription-chips-config');
  const id = 'sc_' + Date.now();
  chips.innerHTML += `<input type="checkbox" id="${id}" value="${val}" checked><label for="${id}">${val}</label>`;
}

function saveProfileSettings() {
  const platforms = [...document.querySelectorAll('#platform-chips-config input:checked')].map(i=>i.value);
  const subscriptions = [...document.querySelectorAll('#subscription-chips-config input:checked')].map(i=>i.value);
  const profile = loadProfile();
  profile.platforms = platforms;
  profile.subscriptions = subscriptions;
  saveProfile(profile);
  document.getElementById('modal-profile').classList.remove('open');
  renderProfile();
  showToast('Plataformas salvas!', 'success');
}

// ─── Import / Export ──────────────────────────────────────────────────────────
function exportData() {
  const data = { games: loadGames(), profile: loadProfile() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gamelog.json';
  a.click();
}

function importData(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.games) saveGames(data.games);
      if (data.profile) saveProfile(data.profile);
      renderCatalog();
      renderProfile();
      showToast(`${(data.games||[]).length} jogos importados!`, 'success');
    } catch { showToast('Arquivo inválido', 'error'); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    document.getElementById('modal-profile').classList.remove('open');
  }
});

document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.getElementById('modal-profile').addEventListener('click', e => { if (e.target.id === 'modal-profile') document.getElementById('modal-profile').classList.remove('open'); });

// ─── Quick Rate Mode ──────────────────────────────────────────────────────────
let _rateQueue = [];
let _rateIdx = 0;
let _rateMode = 'stars'; // 'stars' | 'playtime'

function openRateMode(mode = 'stars') {
  _rateMode = mode;
  document.getElementById('rate-overlay').classList.add('open');
  initRateMode();
}

function closeRateMode() {
  document.getElementById('rate-overlay').classList.remove('open');
  renderCatalog();
}

function initRateMode() {
  const onlyUnrated = document.getElementById('rate-only-unrated').checked;
  const games = loadGames();
  _rateQueue = [...games]
    .filter(g => {
      if (!onlyUnrated) return true;
      if (_rateMode === 'stars')    return !g.rating;
      if (_rateMode === 'playtime') return !g.playtime;
      if (_rateMode === 'genre')    return !g.genres || g.genres.length === 0;
      return true;
    })
    .sort((a, b) => a.title.localeCompare(b.title, 'pt'));
  _rateIdx = 0;
  showRateCurrent();
}

function showRateCurrent() {
  const starsEl  = document.getElementById('rate-stars');
  const ptEl     = document.getElementById('rate-playtime-btns');
  const actionsEl = document.querySelector('.rate-actions');

  if (_rateIdx >= _rateQueue.length) {
    document.getElementById('rate-title').textContent = '✓ Tudo pronto!';
    document.getElementById('rate-platform').textContent = '';
    document.getElementById('rate-meta').textContent = '';
    document.getElementById('rate-counter').textContent = '';
    starsEl.style.visibility = 'hidden';
    ptEl.style.display = 'none';
    actionsEl.style.visibility = 'hidden';
    document.getElementById('rate-progress').style.width = '100%';
    return;
  }

  starsEl.style.visibility = _rateMode === 'stars'    ? 'visible' : 'hidden';
  ptEl.style.display       = _rateMode === 'playtime' ? 'flex'    : 'none';
  actionsEl.style.visibility = 'visible';

  const g = _rateQueue[_rateIdx];
  const total = _rateQueue.length;
  document.getElementById('rate-title').textContent    = g.title;
  document.getElementById('rate-platform').textContent = g.platformPlayed || '';
  document.getElementById('rate-counter').textContent  = `${_rateIdx + 1} / ${total}`;
  document.getElementById('rate-progress').style.width = Math.round((_rateIdx / total) * 100) + '%';

  const parts = [];
  if (g.year) parts.push(`${g.year}`);
  if (g._psn?.pct) parts.push(`${g._psn.pct}% troféus`);
  if (g.rating) parts.push('★'.repeat(Math.round(g.rating / 2)));
  document.getElementById('rate-meta').textContent = parts.join('  ·  ');

  if (_rateMode === 'stars') {
    const cur = g.rating ? Math.round(g.rating / 2) : 0;
    document.querySelectorAll('.rate-star').forEach(s => {
      s.style.color = parseInt(s.dataset.v) <= cur ? 'var(--yellow)' : 'var(--border)';
    });
  } else if (_rateMode === 'playtime') {
    const cur = g.playtime;
    document.querySelectorAll('.playtime-btn').forEach(b => {
      b.style.borderColor = b.dataset.v === cur ? 'var(--accent)' : 'var(--border)';
      b.style.background  = b.dataset.v === cur ? 'rgba(124,92,252,.15)' : 'var(--surface)';
    });
  }
}

function rateAndNext(stars) {
  if (_rateIdx >= _rateQueue.length) return;
  const games = loadGames();
  const idx = games.findIndex(x => x.id === _rateQueue[_rateIdx].id);
  if (idx >= 0) games[idx].rating = stars * 2;
  saveGames(games);
  _rateIdx++;
  showRateCurrent();
}

function playtimeAndNext(val) {
  if (_rateIdx >= _rateQueue.length) return;
  const games = loadGames();
  const idx = games.findIndex(x => x.id === _rateQueue[_rateIdx].id);
  if (idx >= 0) {
    games[idx].playtime = val;
    if (val === 'completed') games[idx].completed = 'yes';
  }
  saveGames(games);
  _rateIdx++;
  showRateCurrent();
}

function rateSkip() {
  _rateIdx++;
  showRateCurrent();
}

// Star hover + click
document.addEventListener('DOMContentLoaded', () => {});
(function setupStars() {
  const stars = document.querySelectorAll('.rate-star');
  stars.forEach(star => {
    const v = parseInt(star.dataset.v);

    star.addEventListener('mouseenter', () => {
      stars.forEach(s => {
        s.style.color = parseInt(s.dataset.v) <= v ? 'var(--yellow)' : 'var(--border)';
        s.style.transform = parseInt(s.dataset.v) <= v ? 'scale(1.12)' : 'scale(1)';
      });
    });

    star.addEventListener('mouseleave', () => {
      // restore to current game's saved rating
      const cur = _rateQueue[_rateIdx]?.rating ? Math.round(_rateQueue[_rateIdx].rating / 2) : 0;
      stars.forEach(s => {
        const sv = parseInt(s.dataset.v);
        s.style.color = sv <= cur ? 'var(--yellow)' : 'var(--border)';
        s.style.transform = 'scale(1)';
      });
    });

    star.addEventListener('click', () => rateAndNext(v));
  });
})();

// Keyboard shortcuts in rate mode
document.addEventListener('keydown', e => {
  if (!document.getElementById('rate-overlay').classList.contains('open')) return;
  if (_rateMode === 'stars' && e.key >= '1' && e.key <= '5') rateAndNext(parseInt(e.key));
  if (_rateMode === 'playtime') {
    if (e.key === '1') playtimeAndNext('little');
    if (e.key === '2') playtimeAndNext('medium');
    if (e.key === '3') playtimeAndNext('much');
    if (e.key === '4') playtimeAndNext('completed');
  }
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); rateSkip(); }
  if (e.key === 'Escape') closeRateMode();
});

// ─── Backlog ──────────────────────────────────────────────────────────────────
let _backlog = [];
let _backlogFiltered = [];   // resultado filtrado/ordenado atual
let _backlogPage = 0;        // quantas páginas já foram renderizadas
const BACKLOG_PAGE_SIZE = 80;
let _backlogObserver = null; // IntersectionObserver do sentinel
let _backlogDropdownsBuilt = false; // dropdowns só precisam ser construídos uma vez

// Debounce da busca: só re-renderiza 300ms após parar de digitar
let _backlogDebounceTimer = null;
function debouncedBacklog() {
  clearTimeout(_backlogDebounceTimer);
  _backlogDebounceTimer = setTimeout(renderBacklog, 300);
}

function backlogCategories(g) {
  return [...new Set([...(g.genres || []), ...(g.subgenres || [])])];
}

function backlogCard(g) {
  const igdbColor = g.igdb_rating >= 90 ? 'var(--green)' : g.igdb_rating >= 75 ? 'var(--accent2)' : g.igdb_rating >= 60 ? 'var(--yellow)' : 'var(--muted)';
  const cats = backlogCategories(g);
  return `<div class="game-card">
    <div class="card-header">
      <span class="game-title">${esc(g.title)}</span>
      ${g.igdb_rating ? `<span class="game-rating" style="color:${igdbColor}">🎯 ${g.igdb_rating}</span>` : ''}
    </div>
    <div class="tags">
      ${cats.map(gn => `<span class="tag genre">${esc(gn)}</span>`).join('')}
    </div>
    <div class="tags">
      ${(g.platforms || []).map(p => `<span class="tag platform">${esc(p)}</span>`).join('')}
    </div>
    <div class="card-meta">
      ${g.year ? `<span>📅 ${g.year}</span>` : ''}
      ${g.community_rating ? `<span title="Rating da comunidade (IGDB)">👥 ${g.community_rating}</span>` : ''}
    </div>
    <div class="card-actions">
      <button class="btn btn-secondary btn-sm" style="color:var(--green);border-color:rgba(74,222,128,.3)" onclick="backlogMarkPlayed(${g.igdb_id})">✅ Já joguei</button>
    </div>
  </div>`;
}

function backlogAppendPage() {
  const grid = document.getElementById('backlog-grid');
  const sentinel = document.getElementById('backlog-sentinel');
  const start = _backlogPage * BACKLOG_PAGE_SIZE;
  const slice = _backlogFiltered.slice(start, start + BACKLOG_PAGE_SIZE);
  if (!slice.length) return;

  const frag = document.createDocumentFragment();
  slice.forEach(g => {
    const div = document.createElement('div');
    div.innerHTML = backlogCard(g);
    frag.appendChild(div.firstElementChild);
  });
  // inserir antes do sentinel
  grid.insertBefore(frag, sentinel);
  _backlogPage++;
}

function renderBacklog() {
  const q        = document.getElementById('backlog-search').value.toLowerCase();
  const category = document.getElementById('backlog-genre').value;
  const platform = document.getElementById('backlog-platform').value;
  const sort     = document.getElementById('backlog-sort').value;

  const playedIds = new Set(_games.map(g => g.igdb_id).filter(Boolean));

  _backlogFiltered = _backlog.filter(g => {
    if (playedIds.has(g.igdb_id)) return false;
    if (q && !g.title.toLowerCase().includes(q)) return false;
    if (category && !backlogCategories(g).includes(category)) return false;
    if (platform && !(g.platforms || []).includes(platform)) return false;
    return true;
  });

  if (sort === 'igdb_rating') {
    // Bayesian weighted score: penaliza notas com poucos reviews
    // score = (rating × count + prior_mean × prior_count) / (count + prior_count)
    const C = 3, m = 75;
    const score = g => g.igdb_rating
      ? (g.igdb_rating * (g.igdb_rating_count || 1) + m * C) / ((g.igdb_rating_count || 1) + C)
      : 0;
    _backlogFiltered.sort((a, b) => score(b) - score(a));
  }
  else if (sort === 'community_rating') _backlogFiltered.sort((a, b) => (b.community_rating || 0) - (a.community_rating || 0));
  else if (sort === 'title')    _backlogFiltered.sort((a, b) => a.title.localeCompare(b.title));
  else if (sort === 'released') _backlogFiltered.sort((a, b) => (b.year || 0) - (a.year || 0));

  // Dropdowns: só constrói uma vez (dados não mudam)
  if (!_backlogDropdownsBuilt) {
    const allCategories = [...new Set(_backlog.flatMap(g => backlogCategories(g)))].sort();
    const allPlatforms  = [...new Set(_backlog.flatMap(g => g.platforms || []))].sort();
    document.getElementById('backlog-genre').innerHTML =
      '<option value="">Todos os gêneros / tags</option>' + allCategories.map(v => `<option value="${v}">${v}</option>`).join('');
    document.getElementById('backlog-platform').innerHTML =
      buildPlatformOptions(allPlatforms, _profile.platforms || []);
    _backlogDropdownsBuilt = true;
  }
  // Restaura seleção dos dropdowns após rebuild
  document.getElementById('backlog-genre').value    = category;
  document.getElementById('backlog-platform').value = platform;

  document.getElementById('backlog-count').textContent = `${_backlogFiltered.length} jogos`;

  // Limpa grid e reseta paginação
  const grid = document.getElementById('backlog-grid');
  grid.innerHTML = '';
  _backlogPage = 0;

  if (!_backlogFiltered.length) {
    grid.innerHTML = `<div class="empty-state"><h3>Nenhum jogo encontrado</h3><p>Tente outros filtros.</p></div>`;
    return;
  }

  // Sentinel para infinite scroll
  const sentinel = document.createElement('div');
  sentinel.id = 'backlog-sentinel';
  sentinel.style.height = '1px';
  grid.appendChild(sentinel);

  // Renderiza primeira página
  backlogAppendPage();

  // Observer: carrega mais ao aproximar do fim
  if (_backlogObserver) _backlogObserver.disconnect();
  _backlogObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) backlogAppendPage();
  }, { rootMargin: '400px' });
  _backlogObserver.observe(sentinel);
}

function backlogMarkPlayed(igdbId) {
  const g = _backlog.find(x => x.igdb_id === igdbId);
  if (!g) return;
  // Abre modal pré-preenchido para o usuário informar rating, playtime, etc.
  // Ativa a aba Catálogo manualmente (sem event)
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-catalog').classList.add('active');
  document.querySelector('.nav-btn[onclick*="catalog"]').classList.add('active');
  openModal();
  setTimeout(() => {
    document.getElementById('modal-title').textContent = 'Adicionar Jogo';
    document.getElementById('game-title').value = g.title;
    document.getElementById('game-year').value = g.year || '';
    buildGenreChips(g.genres || []);
    window._pendingIgdbId = g.igdb_id;
  }, 50);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  const [gamesRes, backlogRes] = await Promise.allSettled([
    fetch('games.json').then(r => r.ok ? r.json() : Promise.reject()),
    fetch('backlog.json').then(r => r.json()),
  ]);

  if (gamesRes.status === 'fulfilled' && Array.isArray(gamesRes.value.games)) {
    _games   = gamesRes.value.games;
    _profile = gamesRes.value.profile || { platforms: [], subscriptions: [] };
  } else {
    const lsGames   = localStorage.getItem('gamelog_games');
    const lsProfile = localStorage.getItem('gamelog_profile');
    _games   = lsGames   ? JSON.parse(lsGames)   : [];
    _profile = lsProfile ? JSON.parse(lsProfile)  : { platforms: [], subscriptions: [] };
    _persistToDisk();
    localStorage.removeItem('gamelog_games');
    localStorage.removeItem('gamelog_profile');
    if (_games.length) showToast(`${_games.length} jogos migrados para games.json`, 'success');
  }

  if (backlogRes.status === 'fulfilled' && Array.isArray(backlogRes.value))
    _backlog = backlogRes.value;

  renderCatalog();

  // Mostra wizard de horas se nunca foi completado e há jogos sem estimativa
  if (!localStorage.getItem('gamelog_hours_wizard_done')) {
    const missing = _games.filter(g => !g.estimated_hours);
    if (missing.length) setTimeout(() => openHoursWizard(missing), 800);
  }
}
init();

// ─── Hours Wizard ─────────────────────────────────────────────────────────────
const HOUR_OPTIONS = [1, 5, 10, 25, 50, 100, 300];
let _wizardSelections = {}; // { game_id: hours }
let _wizardGames = [];

function openHoursWizard(games) {
  _wizardGames = games;
  _wizardSelections = {};

  const playtimeLabel = { little: '🕹 Pouco', medium: '🎮 Médio', much: '🏆 Muito', completed: '✅ Zerado' };
  const list = document.getElementById('wizard-games-list');

  list.innerHTML = games.map(g => `
    <div class="wizard-game" id="wizard-game-${g.id}">
      <div class="wizard-game-title">${esc(g.title)}</div>
      <div class="wizard-game-meta">
        ${g.playtime ? `<span class="tag">${playtimeLabel[g.playtime] || g.playtime}</span>` : ''}
        ${g.platformPlayed ? `<span class="tag platform">🎮 ${esc(g.platformPlayed)}</span>` : ''}
      </div>
      <div class="wizard-hours-btns">
        ${HOUR_OPTIONS.map(h => `
          <button class="wizard-hour-btn" onclick="selectWizardHours(${g.id}, ${h}, this)">~${h}h</button>
        `).join('')}
        <button class="wizard-hour-btn skip" onclick="selectWizardHours(${g.id}, null, this)">Pular</button>
      </div>
    </div>
  `).join('');

  updateWizardCounter();
  document.getElementById('modal-hours-wizard').classList.add('open');
}

function selectWizardHours(gameId, hours, btn) {
  // Desmarca botões anteriores do mesmo jogo
  const card = document.getElementById(`wizard-game-${gameId}`);
  card.querySelectorAll('.wizard-hour-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  if (hours === null) {
    delete _wizardSelections[gameId];
  } else {
    _wizardSelections[gameId] = hours;
  }
  updateWizardCounter();
}

function updateWizardCounter() {
  const total = _wizardGames.length;
  const selected = Object.keys(_wizardSelections).length;
  const pct = Math.round(selected / total * 100);
  document.getElementById('wizard-counter').textContent = `${selected} de ${total} preenchidos`;
  document.getElementById('wizard-bar').style.width = pct + '%';
}

async function saveHoursWizard() {
  const count = Object.keys(_wizardSelections).length;
  if (!count) { closeHoursWizard(); return; }

  const games = loadGames();
  games.forEach(g => {
    if (_wizardSelections[g.id] !== undefined) {
      g.estimated_hours = _wizardSelections[g.id];
    }
  });
  await saveGames(games);
  localStorage.setItem('gamelog_hours_wizard_done', '1');
  closeHoursWizard();
  showToast(`${count} jogos atualizados com tempo estimado!`, 'success');
  renderCatalog();
  renderProfile();
}

function closeHoursWizard() {
  document.getElementById('modal-hours-wizard').classList.remove('open');
  // NÃO marca como concluído aqui — só saveHoursWizard() faz isso.
  // Assim o wizard volta na próxima sessão se o usuário fechar sem salvar.
}
</script>
